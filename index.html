<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5132" />
  <title>TIF Talent Tracker</title>
  <style>
    :root{
      --green:#0f5132; --green2:#198754; --cream:#f7f1df; --card:#fffaf0;
      --text:#173b2f; --muted:#6b7280; --line:#e5dcc7; --gold:#f5c542; --silver:#cfd4da; --bronze:#c9823b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--cream);color:var(--text)}
    header{position:sticky;top:0;z-index:2;background:var(--green);color:white;padding:14px 16px 10px}
    header h1{font-size:20px;margin:0 0 4px}
    header p{margin:0;font-size:13px;opacity:.9}
    nav{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;background:#e9dfc8;border-bottom:1px solid var(--line)}
    nav button{border:0;border-radius:999px;padding:10px 13px;background:white;color:var(--green);font-weight:700;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.08)}
    nav button.active{background:var(--green2);color:white}
    main{padding:14px;max-width:980px;margin:0 auto}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:0 0 14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    h2{font-size:20px;margin:0 0 10px} h3{font-size:16px;margin:14px 0 8px}
    label{font-size:13px;font-weight:700;display:block;margin:8px 0 5px}
    input,select,textarea{width:100%;font-size:16px;border:1px solid #d6ccb8;border-radius:12px;padding:11px;background:white;color:var(--text)}
    textarea{min-height:70px}
    .row{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:700px){.row.two{grid-template-columns:1fr 1fr}.row.three{grid-template-columns:1fr 1fr 1fr}}
    .btn{border:0;border-radius:12px;padding:11px 13px;font-weight:800;background:var(--green);color:white;font-size:15px}
    .btn.secondary{background:white;color:var(--green);border:1px solid var(--green)}
    .btn.danger{background:#b42318;color:white}
    .player{display:flex;justify-content:space-between;gap:10px;align-items:center;border-top:1px solid var(--line);padding:10px 0}
    .player:first-child{border-top:0}
    .small{font-size:13px;color:var(--muted)}
    .pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800;margin:2px;background:#eee}
    .guld{background:var(--gold);color:#4b3600}.sølv{background:var(--silver);color:#263238}.bronze{background:var(--bronze);color:white}.none{background:#e5e7eb;color:#555}
    table{width:100%;border-collapse:collapse;font-size:14px;overflow:hidden;border-radius:12px}
    th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}
    th{background:#efe5cf}
    .exercise-block{border:1px solid var(--line);border-radius:14px;padding:10px;margin:10px 0;background:white}
    .hidden{display:none!important}
    .footer-note{font-size:12px;color:var(--muted);padding:10px;text-align:center}
  </style>
</head>
<body>
<header>
  <h1>TIF Talent Tracker</h1>
  <p>5 øvelser · 3 niveauer · bronze, sølv og guld</p>
</header>

<nav>
  <button onclick="showPage('players')" id="tab-players" class="active">Spillere</button>
  <button onclick="showPage('track')" id="tab-track">Registrering</button>
  <button onclick="showPage('overview')" id="tab-overview">Overblik</button>
  <button onclick="showPage('criteria')" id="tab-criteria">Kriterier</button>
  <button onclick="showPage('settings')" id="tab-settings">Indstillinger</button>
</nav>

<main>
<section id="players" class="page">
  <div class="card">
    <h2>Tilføj spiller</h2>
    <div class="row two">
      <div><label>Navn</label><input id="playerName" placeholder="Fx Oscar" /></div>
      <div><label>Årgang / note</label><input id="playerNote" placeholder="Fx U9, venstrebenet..." /></div>
    </div>
    <p><button class="btn" onclick="addPlayer()">Tilføj spiller</button></p>
  </div>
  <div class="card">
    <h2>Spillere</h2>
    <div id="playerList"></div>
  </div>
</section>

<section id="track" class="page hidden">
  <div class="card">
    <h2>Registrering</h2>
    <label>Vælg spiller</label><select id="trackPlayer" onchange="renderTracking()"></select>
    <div id="trackingArea"></div>
  </div>
</section>

<section id="overview" class="page hidden">
  <div class="card">
    <h2>Holdoverblik</h2>
    <div id="overviewArea"></div>
  </div>
</section>

<section id="criteria" class="page hidden">
  <div class="card">
    <h2>Kriterier</h2>
    <div class="row two">
      <div><label>Øvelse</label><select id="criteriaExercise" onchange="renderCriteria()"></select></div>
      <div><label>Niveau</label><select id="criteriaLevel" onchange="renderCriteria()"><option value="1">Niveau 1</option><option value="2">Niveau 2</option><option value="3">Niveau 3</option></select></div>
    </div>
    <div id="criteriaArea"></div>
  </div>
</section>

<section id="settings" class="page hidden">
  <div class="card">
    <h2>Indstillinger</h2>
    <p class="small">Data gemmes lokalt på den telefon/browser, hvor appen bruges.</p>
    <button class="btn secondary" onclick="exportData()">Eksportér data</button>
    <button class="btn secondary" onclick="importPrompt()">Importér data</button>
    <button class="btn danger" onclick="resetData()">Nulstil alt</button>
    <textarea id="dataBox" placeholder="Eksport/import vises her"></textarea>
  </div>
</section>
</main>
<div class="footer-note">Tip: Åbn siden i Safari og vælg Del → Føj til hjemmeskærm.</div>

<script>
const exercises = ["Boldkontrol","Dribling","Pasning","Afslutning","1v1 / spilforståelse"];
const medals = ["Ikke startet","Bronze","Sølv","Guld"];
const criteria = {};
exercises.forEach(ex => {
  criteria[ex] = {
    1: {Bronze:"Klarer basisudgaven med ro og forståelse.", Sølv:"Klarer øvelsen stabilt flere gange i træk.", Guld:"Klarer øvelsen sikkert med tempo og god teknik."},
    2: {Bronze:"Klarer øvelsen med lidt højere sværhedsgrad.", Sølv:"Klarer øvelsen stabilt under let pres.", Guld:"Klarer øvelsen hurtigt, kontrolleret og med få fejl."},
    3: {Bronze:"Klarer øvelsen i avanceret udgave.", Sølv:"Klarer øvelsen stabilt under pres og med gode valg.", Guld:"Klarer øvelsen på højt niveau med tempo, kvalitet og selvstændige beslutninger."}
  }
});
let data = JSON.parse(localStorage.getItem("tifTalentData") || '{"players":[]}');

function save(){ localStorage.setItem("tifTalentData", JSON.stringify(data)); renderAll(); }
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  renderAll();
}
function addPlayer(){
  const name = document.getElementById("playerName").value.trim();
  const note = document.getElementById("playerNote").value.trim();
  if(!name){ alert("Skriv spillerens navn"); return; }
  const progress = {};
  exercises.forEach(ex => { progress[ex] = {1:"Ikke startet",2:"Ikke startet",3:"Ikke startet"}; });
  data.players.push({id:Date.now().toString(), name, note, progress});
  document.getElementById("playerName").value=""; document.getElementById("playerNote").value="";
  save();
}
function deletePlayer(id){
  if(confirm("Slet spilleren?")){ data.players = data.players.filter(p=>p.id!==id); save(); }
}
function medalClass(m){ return m==="Guld"?"guld":m==="Sølv"?"sølv":m==="Bronze"?"bronze":"none"; }
function renderPlayers(){
  const el = document.getElementById("playerList");
  if(!data.players.length){ el.innerHTML='<p class="small">Ingen spillere endnu.</p>'; return; }
  el.innerHTML = data.players.map(p=>`<div class="player"><div><b>${escapeHtml(p.name)}</b><div class="small">${escapeHtml(p.note||"")}</div></div><button class="btn danger" onclick="deletePlayer('${p.id}')">Slet</button></div>`).join("");
}
function renderSelects(){
  const tp = document.getElementById("trackPlayer");
  tp.innerHTML = data.players.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("");
  const ce = document.getElementById("criteriaExercise");
  ce.innerHTML = exercises.map(e=>`<option>${e}</option>`).join("");
}
function renderTracking(){
  const id = document.getElementById("trackPlayer").value;
  const p = data.players.find(x=>x.id===id);
  const area = document.getElementById("trackingArea");
  if(!p){ area.innerHTML='<p class="small">Tilføj først en spiller.</p>'; return; }
  area.innerHTML = exercises.map(ex => `<div class="exercise-block"><h3>${ex}</h3>
    <div class="row three">${[1,2,3].map(l=>`<div><label>Niveau ${l}</label><select onchange="setMedal('${p.id}','${ex}',${l},this.value)">${medals.map(m=>`<option ${p.progress[ex][l]===m?'selected':''}>${m}</option>`).join("")}</select></div>`).join("")}</div>
  </div>`).join("");
}
function setMedal(pid, ex, level, value){ const p=data.players.find(x=>x.id===pid); p.progress[ex][level]=value; save(); }
function renderOverview(){
  const area=document.getElementById("overviewArea");
  if(!data.players.length){ area.innerHTML='<p class="small">Ingen spillere endnu.</p>'; return; }
  area.innerHTML = `<table><thead><tr><th>Spiller</th><th>Status</th></tr></thead><tbody>` + data.players.map(p=>{
    let pills=[]; exercises.forEach(ex=>[1,2,3].forEach(l=>{ const m=p.progress[ex][l]; if(m!=="Ikke startet") pills.push(`<span class="pill ${medalClass(m)}">${m}</span>`); }));
    return `<tr><td><b>${escapeHtml(p.name)}</b><div class="small">${escapeHtml(p.note||"")}</div></td><td>${pills.length?pills.join(" "):'<span class="pill none">Ingen medaljer</span>'}</td></tr>`;
  }).join("") + `</tbody></table>`;
}
function renderCriteria(){
  const ex=document.getElementById("criteriaExercise").value || exercises[0];
  const level=document.getElementById("criteriaLevel").value || "1";
  const c=criteria[ex][level];
  document.getElementById("criteriaArea").innerHTML = `<h3>${ex} · Niveau ${level}</h3><table><tr><th>Medalje</th><th>Kriterie</th></tr>
  <tr><td><span class="pill bronze">Bronze</span></td><td>${c.Bronze}</td></tr>
  <tr><td><span class="pill sølv">Sølv</span></td><td>${c.Sølv}</td></tr>
  <tr><td><span class="pill guld">Guld</span></td><td>${c.Guld}</td></tr></table>`;
}
function exportData(){ document.getElementById("dataBox").value = JSON.stringify(data,null,2); }
function importPrompt(){ try{ const v=document.getElementById("dataBox").value; if(!v) return alert("Indsæt data i feltet først"); data=JSON.parse(v); save(); alert("Data importeret"); }catch(e){ alert("Kunne ikke importere data"); } }
function resetData(){ if(confirm("Vil du slette alle spillere og registreringer?")){ data={players:[]}; save(); } }
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[s])); }
function renderAll(){ renderPlayers(); renderSelects(); renderTracking(); renderOverview(); renderCriteria(); }
renderAll();
</script>
</body>
</html>
